name: Validate public receipts

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
      - name: Validate every append-only receipt
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          receipts=(runs/*.json)
          for receipt in "${receipts[@]}"; do
            node verify.mjs "${receipt}"
          done
