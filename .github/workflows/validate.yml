name: Validate public receipts

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Validate every append-only receipt
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          receipts=(runs/*.json)
          for receipt in "${receipts[@]}"; do
            node verify.mjs "${receipt}"
          done
